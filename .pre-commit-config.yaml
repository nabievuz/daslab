# DasLab pre-commit hooks
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
---
default_language_version:
  python: python3

repos:
  # ---------------------------------------------------------------------------
  # Standard file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        name: Fix missing end-of-file newline
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
        name: Validate YAML syntax
      - id: check-toml
        name: Validate TOML syntax
      - id: check-merge-conflict
        name: Detect merge-conflict markers

  # ---------------------------------------------------------------------------
  # Ruff — fast Python linter + import sorter
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        name: Ruff lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Ruff format check

  # ---------------------------------------------------------------------------
  # Black — opinionated Python formatter
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: Black formatter
        language_version: python3

  # ---------------------------------------------------------------------------
  # Gitleaks — secret / credential leak detector
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Gitleaks — detect secrets

  # ---------------------------------------------------------------------------
  # DasLab drift guard — subagent definitions must stay in sync with overlays.
  # Regenerates .claude/agents/ + board/ROUTING.md; fails if git detects drift.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: gen-subagents-drift-check
        name: Subagent drift check (gen_subagents.py)
        language: system
        entry: >-
          bash -c 'python3 scripts/gen_subagents.py &&
          git diff --exit-code .claude/agents/ board/ROUTING.md ||
          (echo "DRIFT: subagent definitions are out of sync; commit the regenerated files." && exit 1)'
        pass_filenames: false
        always_run: false
        files: >-
          (?x)^(
            .*AGENTS\.md|
            governance/policies/model-allocation\.md|
            scripts/gen_subagents\.py
          )$
