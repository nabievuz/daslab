# Alembic config for ArcRift schema migrations.
#
# DISCIPLINE: every migration under migrations/versions/ is a never-auto-approve
# `schema_migration` (Critical / QONUN-5) — applied ONLY by a human Founder against the
# real ArcRift database, NEVER auto-applied by the engine. CI validates upgrade() +
# downgrade() against a DISPOSABLE shadow SQLite (tests/test_arcrift_migration.py); it
# does not touch ~/ArcRift/backend/ArcRift.db. The sqlalchemy.url below is a deliberately
# INERT in-memory placeholder; the real URL is supplied at apply-time (e.g. via
# `alembic -x url=sqlite:////path/to/ArcRift.db ...` or env) or by the shadow harness —
# it is never hard-coded to the live database.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///:memory:

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
