# Read via scripts/feature_flags.py (enabled("<flag>")).

dgox_emit: false        # /daslab-cycle step 5d routing_decision shadow emission (ADR-0011 Phase-1, no Phase-2 consumer yet)
t4_t7_governors: false  # T4 cost/model-mix + T7 quality governor invocations during a wave
