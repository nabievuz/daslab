# DasLab — T7 Quality Rubric (SSOT)
# Weighted quality score. IMMUTABLE — T7 is a hard blocker.
# Consumed by: scripts/check_t7_quality.py + the Verify & Review lane.
# Weights MUST sum to 1.00. A change here is governance/policy → never-auto-approve.
version: 1
updated: 2026-06-21

dimensions:
  correctness:
    weight: 0.30
    verification: "tests passed + verify (status/log actually changed)"
  evidence_factuality:
    weight: 0.20
    verification: "adversarial check + source verification (AI output can be plausible yet false)"
  tests:
    weight: 0.15
    verification: "coverage held or raised; new tests added for new behavior"
  security:
    weight: 0.15
    verification: "config/ security baseline not violated (secrets/permissions/injection)"
  completeness:
    weight: 0.10
    verification: "ticket Definition-of-Done fulfilled"
  maintainability:
    weight: 0.10
    verification: "complexity not increased"

# T7 is the HARD CONSTRAINT all tuning is subordinate to.
constraint:
  immutable: true
  max_quality_drop: 0          # STRUCTURED zero-drop policy (enforced numerically)
  rule: "T7 must not degrade vs baseline; max_quality_drop in any GATE-6 record must be 0"
  open_question: "A bounded T7 exploration budget (±2% with mandatory rollback) is under review — NOT adopted; strict 0 enforced."
