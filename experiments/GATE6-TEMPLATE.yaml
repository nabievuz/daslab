# GATE-6 Record Template — copy to experiments/GATE6-YYYYMMDD-NNNN.yaml
# Required by scripts/check_gate6_record.py for every tuning/optimization change.
gate_6_record:
  id: GATE6-20260621-0001
  created_at: 2026-06-21T00:00:00Z
  proposed_by: ai_optimization_agent      # | human_operator | system_trigger
  affected_component: scheduler           # | reviewer | memory | ci | governance | routing | release
  change_type: tune_concurrency           # must match a TUNING_CHANGE_TYPE in the validator
  hypothesis: "If concurrency width 4->6, T1 busy fraction rises >=10pp without T7 drop."
